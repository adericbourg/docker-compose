modules:

  # ICMP probe (ping) — measures latency, jitter and packet loss
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4

  # HTTP GET probe — measures availability and response time
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []   # empty = any 2xx code is accepted
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4

  # TCP probe — useful later for local services (port check)
  tcp_connect:
    prober: tcp
    timeout: 5s
